# Docker Compose Configuration for GameStore Microservices

services:
  discovery-server:
    build: ./microservices/discovery-server
    ports:
      - "8761:8761"
    networks:
      - gamestore-network

  user-service:
    build: ./microservices/user-service
    ports:
      - "8081:8081"
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - DB_URL=${DB_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - discovery-server
    networks:
      - gamestore-network

  product-service:
    build: ./microservices/product-service
    ports:
      - "8082:8082"
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - DB_URL=${DB_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - discovery-server
    networks:
      - gamestore-network

  order-service:
    build: ./microservices/order-service
    ports:
      - "8083:8083"
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - DB_URL=${DB_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - discovery-server
      - user-service
      - product-service
    networks:
      - gamestore-network

  gateway-service:
    build: ./microservices/gateway-service
    ports:
      - "8080:8080"
    environment:
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - discovery-server
      - user-service
      - product-service
      - order-service
    networks:
      - gamestore-network

networks:
  gamestore-network:
    driver: bridge
