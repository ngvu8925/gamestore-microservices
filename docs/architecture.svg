<svg width="900" height="620" viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="620" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#e6edf3">GameStore Microservices Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#8b949e">Java 17 · Spring Boot 3.3 · Spring Cloud · Docker</text>

  <!-- ===== CLIENT ===== -->
  <rect x="30" y="90" width="130" height="52" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="95" y="112" text-anchor="middle" font-size="13" font-weight="600" fill="#79c0ff">Client</text>
  <text x="95" y="130" text-anchor="middle" font-size="11" fill="#8b949e">Postman / Frontend</text>

  <!-- Arrow client → gateway -->
  <line x1="160" y1="116" x2="218" y2="116" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="189" y="109" text-anchor="middle" font-size="10" fill="#8b949e">HTTP</text>

  <!-- ===== DOCKER NETWORK boundary ===== -->
  <rect x="200" y="72" width="660" height="430" rx="12" fill="none" stroke="#21262d" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="216" y="90" font-size="10" fill="#30363d">Docker Network: gamestore-network</text>

  <!-- ===== API GATEWAY ===== -->
  <rect x="222" y="90" width="180" height="72" rx="8" fill="#1a1f6e" stroke="#388bfd" stroke-width="1.5"/>
  <text x="312" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#79c0ff">API Gateway</text>
  <text x="312" y="133" text-anchor="middle" font-size="11" fill="#a5b4fc">Spring Cloud Gateway</text>
  <text x="312" y="150" text-anchor="middle" font-size="11" fill="#8b949e">:8080 · JWT Validate · Route</text>

  <!-- ===== EUREKA ===== -->
  <rect x="660" y="90" width="180" height="72" rx="8" fill="#1a2e1a" stroke="#3fb950" stroke-width="1.5"/>
  <text x="750" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#56d364">Discovery Server</text>
  <text x="750" y="133" text-anchor="middle" font-size="11" fill="#7ee787">Eureka Server</text>
  <text x="750" y="150" text-anchor="middle" font-size="11" fill="#8b949e">:8761 · Service Registry</text>

  <!-- Gateway ↔ Eureka dashed -->
  <line x1="402" y1="126" x2="658" y2="126" stroke="#3fb950" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrGreen)" marker-start="url(#arrGreenR)"/>
  <text x="530" y="118" text-anchor="middle" font-size="10" fill="#3fb950">register / discover</text>

  <!-- ===== SERVICES ROW ===== -->
  <!-- User Service -->
  <rect x="222" y="240" width="160" height="80" rx="8" fill="#1e1b2e" stroke="#a371f7" stroke-width="1.5"/>
  <text x="302" y="265" text-anchor="middle" font-size="13" font-weight="700" fill="#d2a8ff">User Service</text>
  <text x="302" y="283" text-anchor="middle" font-size="11" fill="#bc8cff">:8081</text>
  <text x="302" y="300" text-anchor="middle" font-size="10" fill="#8b949e">Auth · Register · JWT</text>
  <text x="302" y="314" text-anchor="middle" font-size="10" fill="#8b949e">JaCoCo 100% svc</text>

  <!-- Product Service -->
  <rect x="415" y="240" width="160" height="80" rx="8" fill="#1e1b2e" stroke="#a371f7" stroke-width="1.5"/>
  <text x="495" y="265" text-anchor="middle" font-size="13" font-weight="700" fill="#d2a8ff">Product Service</text>
  <text x="495" y="283" text-anchor="middle" font-size="11" fill="#bc8cff">:8082</text>
  <text x="495" y="300" text-anchor="middle" font-size="10" fill="#8b949e">Catalog · Stock</text>
  <text x="495" y="314" text-anchor="middle" font-size="10" fill="#8b949e">CRUD · Search</text>

  <!-- Order Service -->
  <rect x="608" y="240" width="160" height="80" rx="8" fill="#1e1b2e" stroke="#a371f7" stroke-width="1.5"/>
  <text x="688" y="265" text-anchor="middle" font-size="13" font-weight="700" fill="#d2a8ff">Order Service</text>
  <text x="688" y="283" text-anchor="middle" font-size="11" fill="#bc8cff">:8083</text>
  <text x="688" y="300" text-anchor="middle" font-size="10" fill="#8b949e">Place Order</text>
  <text x="688" y="314" text-anchor="middle" font-size="10" fill="#8b949e">Feign: User + Product</text>

  <!-- Gateway → each service -->
  <line x1="302" y1="162" x2="302" y2="240" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="312" y1="162" x2="495" y2="240" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="322" y1="162" x2="688" y2="240" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Services → Eureka register dashed -->
  <line x1="302" y1="240" x2="720" y2="162" stroke="#3fb950" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrGreen)"/>
  <line x1="495" y1="240" x2="735" y2="162" stroke="#3fb950" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrGreen)"/>
  <line x1="688" y1="240" x2="750" y2="162" stroke="#3fb950" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrGreen)"/>

  <!-- OpenFeign arrows Order → User, Order → Product -->
  <path d="M 608 295 Q 560 355 575 295" fill="none" stroke="#f78166" stroke-width="1.2" stroke-dasharray="4 2" marker-end="url(#arrRed)"/>
  <text x="555" y="340" text-anchor="middle" font-size="10" fill="#f78166">Feign</text>
  <text x="555" y="352" text-anchor="middle" font-size="10" fill="#f78166">verify user</text>

  <path d="M 608 285 Q 580 380 575 285" fill="none" stroke="#f78166" stroke-width="1.2" stroke-dasharray="4 2" marker-end="url(#arrRed)"/>

  <!-- ===== DATABASES ===== -->
  <!-- DB User -->
  <rect x="222" y="390" width="160" height="52" rx="8" fill="#161b22" stroke="#f0883e" stroke-width="1.2"/>
  <text x="302" y="412" text-anchor="middle" font-size="12" font-weight="600" fill="#ffa657">SQL Server</text>
  <text x="302" y="430" text-anchor="middle" font-size="10" fill="#8b949e">users · roles · permissions</text>

  <!-- DB Product -->
  <rect x="415" y="390" width="160" height="52" rx="8" fill="#161b22" stroke="#f0883e" stroke-width="1.2"/>
  <text x="495" y="412" text-anchor="middle" font-size="12" font-weight="600" fill="#ffa657">SQL Server</text>
  <text x="495" y="430" text-anchor="middle" font-size="10" fill="#8b949e">products · inventory</text>

  <!-- DB Order -->
  <rect x="608" y="390" width="160" height="52" rx="8" fill="#161b22" stroke="#f0883e" stroke-width="1.2"/>
  <text x="688" y="412" text-anchor="middle" font-size="12" font-weight="600" fill="#ffa657">SQL Server</text>
  <text x="688" y="430" text-anchor="middle" font-size="10" fill="#8b949e">orders · order_items</text>

  <!-- Service → DB arrows -->
  <line x1="302" y1="320" x2="302" y2="390" stroke="#f0883e" stroke-width="1.2" marker-end="url(#arrOrange)"/>
  <line x1="495" y1="320" x2="495" y2="390" stroke="#f0883e" stroke-width="1.2" marker-end="url(#arrOrange)"/>
  <line x1="688" y1="320" x2="688" y2="390" stroke="#f0883e" stroke-width="1.2" marker-end="url(#arrOrange)"/>

  <!-- GearHost note -->
  <text x="450" y="462" text-anchor="middle" font-size="10" fill="#8b949e">Hosted on GearHost (Cloud SQL Server)</text>

  <!-- ===== CI/CD BOTTOM ===== -->
  <rect x="30" y="510" width="840" height="90" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="450" y="533" text-anchor="middle" font-size="13" font-weight="700" fill="#e6edf3">CI/CD Pipeline — GitHub Actions</text>

  <!-- Steps -->
  <rect x="50" y="545" width="120" height="40" rx="6" fill="#1f2937" stroke="#388bfd" stroke-width="1"/>
  <text x="110" y="561" text-anchor="middle" font-size="11" font-weight="600" fill="#79c0ff">Push to main</text>
  <text x="110" y="577" text-anchor="middle" font-size="10" fill="#8b949e">trigger workflow</text>

  <line x1="170" y1="565" x2="188" y2="565" stroke="#30363d" stroke-width="1.2" marker-end="url(#arrGray)"/>

  <rect x="190" y="545" width="130" height="40" rx="6" fill="#1f2937" stroke="#a371f7" stroke-width="1"/>
  <text x="255" y="561" text-anchor="middle" font-size="11" font-weight="600" fill="#d2a8ff">mvn test</text>
  <text x="255" y="577" text-anchor="middle" font-size="10" fill="#8b949e">JUnit 5 · Mockito</text>

  <line x1="320" y1="565" x2="338" y2="565" stroke="#30363d" stroke-width="1.2" marker-end="url(#arrGray)"/>

  <rect x="340" y="545" width="150" height="40" rx="6" fill="#1f2937" stroke="#3fb950" stroke-width="1"/>
  <text x="415" y="561" text-anchor="middle" font-size="11" font-weight="600" fill="#56d364">JaCoCo report</text>
  <text x="415" y="577" text-anchor="middle" font-size="10" fill="#8b949e">Coverage 77%+</text>

  <line x1="490" y1="565" x2="508" y2="565" stroke="#30363d" stroke-width="1.2" marker-end="url(#arrGray)"/>

  <rect x="510" y="545" width="150" height="40" rx="6" fill="#1f2937" stroke="#f0883e" stroke-width="1"/>
  <text x="585" y="561" text-anchor="middle" font-size="11" font-weight="600" fill="#ffa657">docker build</text>
  <text x="585" y="577" text-anchor="middle" font-size="10" fill="#8b949e">5 images</text>

  <line x1="660" y1="565" x2="678" y2="565" stroke="#30363d" stroke-width="1.2" marker-end="url(#arrGray)"/>

  <rect x="680" y="545" width="170" height="40" rx="6" fill="#1f2937" stroke="#56d364" stroke-width="1"/>
  <text x="765" y="561" text-anchor="middle" font-size="11" font-weight="600" fill="#56d364">docker-compose up</text>
  <text x="765" y="577" text-anchor="middle" font-size="10" fill="#8b949e">Deploy all services</text>

  <!-- ===== LEGEND ===== -->
  <line x1="30" y1="490" x2="60" y2="490" stroke="#388bfd" stroke-width="1.5"/>
  <text x="65" y="494" font-size="10" fill="#8b949e">HTTP Route</text>
  <line x1="140" y1="490" x2="170" y2="490" stroke="#3fb950" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="175" y="494" font-size="10" fill="#8b949e">Service Discovery</text>
  <line x1="290" y1="490" x2="320" y2="490" stroke="#f78166" stroke-width="1.2" stroke-dasharray="4 2"/>
  <text x="325" y="494" font-size="10" fill="#8b949e">OpenFeign (inter-service)</text>
  <line x1="480" y1="490" x2="510" y2="490" stroke="#f0883e" stroke-width="1.2"/>
  <text x="515" y="494" font-size="10" fill="#8b949e">JPA / Database</text>

  <!-- ===== ARROW MARKERS ===== -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#388bfd" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#3fb950" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrGreenR" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#3fb950" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#f78166" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrOrange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#f0883e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrGray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#30363d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
</svg>