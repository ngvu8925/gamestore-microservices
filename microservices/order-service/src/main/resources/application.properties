spring.application.name=order-service
server.port=8083

# KẾT NỐI DATABASE
spring.datasource.url=${DB_URL:jdbc:sqlserver://den1.mssql8.gear.host:1433;databaseName=microservices;encrypt=true;trustServerCertificate=true;loginTimeout=30}
spring.datasource.username=${DB_USERNAME:microservices}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.datasource.hikari.maximum-pool-size=5

# CIRCUIT BREAKER
feign.circuitbreaker.enabled=true

# CẤU HÌNH EUREKA CLIENT
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
