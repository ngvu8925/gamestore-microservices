# ============================================
# USER SERVICE - PORT 8081
# ============================================
spring.application.name=user-service
server.port=8081

# KẾT NỐI DATABASE
spring.datasource.url=${DB_URL:jdbc:sqlserver://den1.mssql8.gear.host:1433;databaseName=microservices;encrypt=true;trustServerCertificate=true;loginTimeout=30}
spring.datasource.username=${DB_USERNAME:microservices}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JWT
jwt.secret=${JWT_SECRET}

# EUREKA DISCOVERY
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
