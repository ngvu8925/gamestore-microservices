name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    name: Build & Test Microservices
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [user-service, product-service, order-service]

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build and Test ${{ matrix.service }}
      working-directory: microservices/${{ matrix.service }}
      run: ../../mvnw clean test

    - name: Generate JaCoCo Badge
      id: jacoco
      uses: cicirello/jacoco-badge-generator@v2
      with:
        jacoco-csv-file: microservices/${{ matrix.service }}/target/site/jacoco/jacoco.csv
        badges-directory: badges/${{ matrix.service }}
        generate-summary: true

    - name: Log coverage percentage
      run: |
        echo "Service: ${{ matrix.service }}"
        echo "Coverage: ${{ steps.jacoco.outputs.coverage }}"
        echo "Branches: ${{ steps.jacoco.outputs.branches }}"

    - name: Commit and Push Badges
      if: github.event_name == 'push'
      uses: stefanzweifel/git-auto-commit-action@v4
      with:
        commit_message: "Auto-update Jacoco Badges for ${{ matrix.service }}"
        file_pattern: badges/${{ matrix.service }}/*.svg

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build_and_test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Services via Docker Compose
      working-directory: .
      run: docker compose build
